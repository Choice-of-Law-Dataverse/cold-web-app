name: Trigger auto deployment for cold-nuxt-frontend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ alpha ]
    paths:
    - '**'
    - '.github/workflows/cold-nuxt-frontend-AutoDeployTrigger-febe30b3-5838-4446-a2bb-ecefadff264f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.COLDNUXTFRONTEND_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COLDNUXTFRONTEND_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COLDNUXTFRONTEND_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          _dockerfilePathKey_: _dockerfilePath_
          registryUrl: docker.io
          registryUsername: ${{ secrets.COLDNUXTFRONTEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COLDNUXTFRONTEND_REGISTRY_PASSWORD }}
          containerAppName: cold-nuxt-frontend
          resourceGroup: cold
          imageToBuild: simonweigold/cold-nuxt-frontend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


