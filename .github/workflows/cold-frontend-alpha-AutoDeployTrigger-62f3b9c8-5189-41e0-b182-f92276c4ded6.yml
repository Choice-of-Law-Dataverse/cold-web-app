name: Trigger auto deployment for cold-frontend-alpha

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ alpha ]
    paths:
    - '**'
    - '.github/workflows/cold-frontend-alpha-AutoDeployTrigger-62f3b9c8-5189-41e0-b182-f92276c4ded6.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.COLDFRONTENDALPHA_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.COLDFRONTENDALPHA_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.COLDFRONTENDALPHA_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/frontend
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: docker.io
          registryUsername: ${{ secrets.COLDFRONTENDALPHA_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.COLDFRONTENDALPHA_REGISTRY_PASSWORD }}
          containerAppName: cold-frontend-alpha
          resourceGroup: cold
          imageToBuild: simonweigold/cold-frontend-alpha:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


